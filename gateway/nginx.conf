upstream agent_service {
    server agent-service:8000;
}

upstream product_service {
    server product-service:8081;
}

upstream review_service {
    server review-service:8082;
}

upstream order_service {
    server order-service:8083;
}

upstream inventory_service {
    server inventory-service:8084;
}

upstream payment_service {
    server payment-service:8085;
}

# Rate limiting zone: 10 req/s per IP
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

server {
    listen 80;
    server_name _;

    # --- Global settings ---
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-ID      $request_id;

    # Timeouts (agent LLM calls can be slow)
    proxy_connect_timeout 10s;
    proxy_read_timeout    120s;
    proxy_send_timeout    30s;

    # Request body size (for chat messages)
    client_max_body_size 5m;

    # --- Health check ---
    location /health {
        proxy_pass http://agent_service/health;
        limit_req zone=api_limit burst=20 nodelay;
    }

    # --- Agent chat API ---
    location /api/chat {
        proxy_pass http://agent_service/api/chat;
        limit_req zone=api_limit burst=5 nodelay;
    }

    location /api/approve {
        proxy_pass http://agent_service/api/approve;
        limit_req zone=api_limit burst=5 nodelay;
    }

    # Agent OpenAPI docs (development convenience)
    location /api/docs {
        proxy_pass http://agent_service/docs;
    }

    location /api/openapi.json {
        proxy_pass http://agent_service/openapi.json;
    }

    # --- Product Service ---
    location /api/products {
        proxy_pass http://product_service/api/products;
        limit_req zone=api_limit burst=20 nodelay;
    }

    location /api/categories {
        proxy_pass http://product_service/api/categories;
        limit_req zone=api_limit burst=20 nodelay;
    }

    # --- Review Service ---
    location /api/reviews {
        proxy_pass http://review_service/api/reviews;
        limit_req zone=api_limit burst=20 nodelay;
    }

    # --- Order Service ---
    location /api/orders {
        proxy_pass http://order_service/api/orders;
        limit_req zone=api_limit burst=10 nodelay;
    }

    # --- Inventory Service ---
    location /api/inventory {
        proxy_pass http://inventory_service/api/inventory;
        limit_req zone=api_limit burst=20 nodelay;
    }

    # --- Payment Service ---
    location /api/payments {
        proxy_pass http://payment_service/api/payments;
        limit_req zone=api_limit burst=10 nodelay;
    }

    # --- Error pages ---
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        default_type application/json;
        return 503 '{"error": "Service temporarily unavailable", "code": 503}';
    }
}
